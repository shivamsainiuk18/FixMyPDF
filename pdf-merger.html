<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Header -->
    <header class="my-6 flex justify-between items-center custom-card p-4 rounded-2xl">
        <a href="index.html" class="text-xs font-bold text-blue-500 flex items-center gap-1.5"><i class="fas fa-arrow-left"></i> Home</a>
        <h1 class="text-xl font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="px-3 py-1 rounded-full border border-gray-700 text-[10px] font-bold">Theme</button>
    </header>

    <div class="mb-4">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">PDF Merger</h2>
        <p class="text-xs text-gray-400">Multiple PDF files ko combine karke ek banayein.</p>
    </div>

    <!-- Upload Box -->
    <div class="relative custom-card rounded-2xl p-8 text-center border-2 border-dashed border-purple-900/60 hover:border-purple-500 transition-all mb-4 group">
        <input accept="application/pdf" id="pdfInput" multiple type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
        <div class="w-16 h-16 bg-purple-600/10 text-purple-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-file-pdf text-3xl"></i>
        </div>
        <h3 class="text-sm font-bold" id="uploadBoxText" style="color: var(--text-title);">Select Multiple PDFs</h3>
    </div>

    <!-- File List & Action -->
    <div id="fileList" class="mb-4 space-y-2 text-xs text-gray-400"></div>

    <button class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3.5 rounded-xl hidden" id="mergeBtn">
        <i class="fas fa-layer-group mr-2"></i> Merge & Download
    </button>

    <script>
        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });

        // Merging Logic
        const pdfInput = document.getElementById('pdfInput');
        const uploadBoxText = document.getElementById('uploadBoxText');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        let selectedFiles = [];

        pdfInput.addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            if (selectedFiles.length > 0) {
                uploadBoxText.innerText = `${selectedFiles.length} PDFs Selected`;
                mergeBtn.classList.remove('hidden');
                fileList.innerHTML = selectedFiles.map(f => `<div class="custom-card p-2 rounded-lg">${f.name}</div>`).join('');
            }
        });

        mergeBtn.addEventListener('click', async () => {
            const mergedPdf = await PDFLib.PDFDocument.create();
            for (const file of selectedFiles) {
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach(page => mergedPdf.addPage(page));
            }
            const blob = new Blob([await mergedPdf.save()], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Merged_Document.pdf";
            link.click();
        });
    </script>
</body>
</html>
