<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyPDF - Smart & Private Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0f14; color: #e2e8f0; font-family: sans-serif; }
        .custom-card { background: #161920; border: 1px solid #232936; }
        .tool-box { background: #1a1e28; border: 1px solid #2d3446; text-decoration: none; display: block; padding: 16px; border-radius: 12px; text-align: center; }
        .tool-box:hover { border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="flex justify-between items-center mb-6 p-4 bg-[#161920] rounded-2xl border border-[#232936]">
        <div>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">ShivNeh Labs</p>
            <h1 class="text-xl font-black text-white">FixMy<span class="text-blue-500">PDF</span></h1>
        </div>
        <button id="themeToggle" class="bg-gray-800 text-white px-4 py-1.5 rounded-full text-xs font-bold">Mode</button>
    </header>

    <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-3 ml-1">PDF Tools</h2>
    <div class="grid grid-cols-2 gap-3 mb-6">
        <a href="jpg-to-pdf.html" class="tool-box"><i class="fas fa-image text-blue-400 mb-2"></i><div class="text-[11px] font-bold">JPG to PDF</div></a>
        <a href="png-to-pdf.html" class="tool-box"><i class="fas fa-file-contract text-green-400 mb-2"></i><div class="text-[11px] font-bold">PNG to PDF</div></a>
        <a href="pdf-merger.html" class="tool-box"><i class="fas fa-object-group text-yellow-400 mb-2"></i><div class="text-[11px] font-bold">PDF Merger</div></a>
        <a href="pdf-compressor.html" class="tool-box"><i class="fas fa-compress-arrows-alt text-red-400 mb-2"></i><div class="text-[11px] font-bold">PDF Compressor</div></a>
    </div>

    <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-3 ml-1">Image Tools</h2>
    <div class="grid grid-cols-2 gap-3 mb-6">
        <a href="image-compressor.html" class="tool-box"><i class="fas fa-compress text-purple-400 mb-2"></i><div class="text-[11px] font-bold">Img Comp</div></a>
        <a href="image-resizer.html" class="tool-box"><i class="fas fa-expand text-pink-400 mb-2"></i><div class="text-[11px] font-bold">Img Resizer</div></a>
        <a href="webp-converter.html" class="tool-box"><i class="fas fa-sync text-cyan-400 mb-2"></i><div class="text-[11px] font-bold">WebP Conv</div></a>
    </div>

    <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-3 ml-1">Utilities</h2>
    <div class="grid grid-cols-2 gap-3 mb-6">
        <a href="qr-generator.html" class="tool-box"><i class="fas fa-qrcode text-yellow-500 mb-2"></i><div class="text-[11px] font-bold">QR Generator</div></a>
        <a href="password-generator.html" class="tool-box"><i class="fas fa-key text-red-500 mb-2"></i><div class="text-[11px] font-bold">Password Gen</div></a>
    </div>

    <h2 class="text-[10px] font-bold text-gray-500 uppercase mb-3 ml-1">Text & SEO</h2>
    <div class="grid grid-cols-2 gap-3 mb-8">
        <a href="word-counter.html" class="tool-box"><i class="fas fa-font text-indigo-400 mb-2"></i><div class="text-[11px] font-bold">Word Counter</div></a>
        <a href="lorem-generator.html" class="tool-box"><i class="fas fa-align-left text-orange-400 mb-2"></i><div class="text-[11px] font-bold">Lorem Ipsum</div></a>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));
    </script>
</body>
</html>
