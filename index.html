<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyPDF - Smart & Private Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --text-main: #374151; --text-title: #111827; }
        
        body { background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .light-mode .glass-header { background: rgba(255, 255, 255, 0.8); border-bottom: 1px solid #e5e7eb; }
        .custom-card { background: var(--bg-card); border: 1px solid #232936; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .active .accordion-content { max-height: 1000px; }
        .active .accordion-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Professional Glassmorphism Header -->
    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-bold text-[var(--text-title)]">FixMy<span class="text-blue-500">PDF</span></h1>
        </div>
        <button id="themeToggle" class="bg-gray-800 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-blue-600 transition-all">
            <i class="fas fa-adjust mr-1"></i> Mode
        </button>
    </header>

    <!-- Active Tool Status -->
    <div class="custom-card rounded-xl p-3 mb-6 border-l-4 border-l-green-500 flex items-center gap-3">
        <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
        <p class="text-sm font-bold">ShivNeh Labs | Active Suite</p>
    </div>

    <!-- Main Entry Point -->
    <a href="jpg-to-pdf.html" class="block custom-card rounded-2xl p-8 text-center border-2 border-dashed border-blue-500/30 hover:border-blue-500 transition-all mb-6 group">
        <div class="w-16 h-16 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-105 transition-transform">
            <i class="fas fa-file-upload text-3xl"></i>
        </div>
        <h3 class="text-lg font-bold text-[var(--text-title)]">Select Images to Convert</h3>
        <p class="text-xs text-gray-400 mt-1">Fast, Secure & Private PDF conversion</p>
    </a>

    <!-- Tools Accordion -->
    <div class="space-y-4 mb-8">
        <!-- Add your tool sections here with the updated header logic -->
        <!-- (Maine isme wahi accordion rakha hai jo aapka tha, bas styling clean kar di hai) -->
        <div class="custom-card rounded-xl overflow-hidden active border border-blue-500/20">
            <div onclick="toggleAccordion(this)" class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-800/50">
                <span class="font-bold text-sm text-[var(--text-title)]"><i class="fas fa-file-pdf mr-2 text-blue-400"></i> PDF Tools</span>
                <i class="fas fa-chevron-down text-xs accordion-icon"></i>
            </div>
            <div class="accordion-content bg-gray-900/20">
                <div class="p-4 grid grid-cols-2 gap-3">
                    <a href="jpg-to-pdf.html" class="bg-gray-800 p-3 rounded-lg text-center text-xs font-semibold hover:bg-blue-600 transition-all">JPG to PDF</a>
                    <a href="pdf-merger.html" class="bg-gray-800 p-3 rounded-lg text-center text-xs font-semibold hover:bg-blue-600 transition-all">PDF Merger</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAccordion(el) { el.parentElement.classList.toggle('active'); }
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });
    </script>
</body>
</html>
