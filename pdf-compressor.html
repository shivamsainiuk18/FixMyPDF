<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <a href="index.html" class="text-blue-500 hover:text-blue-400"><i class="fas fa-home text-xl"></i></a>
        <h1 class="text-lg font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="text-gray-400 hover:text-red-500"><i class="fas fa-adjust"></i></button>
    </header>

    <div class="mb-4 text-center">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">PDF Compressor</h2>
        <p class="text-xs text-gray-400">Reduce file size without quality loss.</p>
    </div>

    <div class="relative custom-card rounded-2xl p-8 text-center border-2 border-dashed border-red-500/30 hover:border-red-500 transition-all mb-4">
        <input accept="application/pdf" id="pdfInput" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
        <div class="w-16 h-16 bg-red-600/10 text-red-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-file-archive text-3xl"></i>
        </div>
        <h3 class="text-sm font-bold" id="uploadBoxText">Choose PDF File</h3>
    </div>

    <div id="metricsContainer" class="mb-4 hidden">
        <div class="custom-card rounded-xl p-3 flex justify-between items-center text-xs">
            <p class="text-gray-400 font-medium">Original Size: <span id="originalSizeText" class="font-bold text-white">0.00 MB</span></p>
        </div>
    </div>

    <button id="compressBtn" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3.5 rounded-xl hidden transition-all">
        <i class="fas fa-compress-arrows-alt mr-2"></i> Compress PDF
    </button>
    <button id="downloadBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 rounded-xl hidden transition-all mt-3">
        <i class="fas fa-download mr-2"></i> Download Compressed
    </button>

    <script>
        let selectedFile = null;
        let compressedBytes = null;

        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));

        const pdfInput = document.getElementById('pdfInput');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        pdfInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('uploadBoxText').innerText = selectedFile.name;
                document.getElementById('originalSizeText').innerText = `${(selectedFile.size / (1024 * 1024)).toFixed(2)} MB`;
                document.getElementById('metricsContainer').classList.remove('hidden');
                compressBtn.classList.remove('hidden');
            }
        });

        compressBtn.addEventListener('click', async () => {
            compressBtn.innerText = 'Compressing...';
            const fileBytes = await selectedFile.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
            // Optimization settings
            compressedBytes = await pdfDoc.save({ useObjectStreams: true, addDefaultPage: false });
            compressBtn.classList.add('hidden');
            downloadBtn.classList.remove('hidden');
        });

        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([compressedBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Compressed_${selectedFile.name}`;
            link.click();
        });
    </script>
</body>
</html>
