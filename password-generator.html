<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <a href="index.html" class="text-blue-500 hover:text-blue-400"><i class="fas fa-home text-xl"></i></a>
        <h1 class="text-lg font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="text-gray-400 hover:text-emerald-500"><i class="fas fa-adjust"></i></button>
    </header>

    <div class="mb-6 text-center">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Password Generator</h2>
        <p class="text-xs text-gray-400">Generate secure, random passwords.</p>
    </div>

    <div class="custom-card rounded-2xl p-4 mb-4 flex items-center justify-between border-2 border-emerald-500/20">
        <input type="text" id="passwordDisplay" readonly placeholder="Click Generate..." class="bg-transparent font-mono font-bold text-lg w-full outline-none">
        <button id="copyBtn" class="text-emerald-400 hover:text-white transition-colors"><i class="far fa-copy text-xl"></i></button>
    </div>

    <div class="custom-card rounded-2xl p-5 space-y-4">
        <div>
            <div class="flex justify-between text-xs mb-2"><span>Length:</span> <span id="lengthVal" class="font-bold text-emerald-400">12</span></div>
            <input type="range" id="lengthSlider" min="6" max="32" value="12" class="w-full accent-emerald-500 h-1.5 bg-gray-800 rounded-lg cursor-pointer">
        </div>
        <div class="grid grid-cols-2 gap-3 text-xs">
            <label class="flex items-center gap-2"><input type="checkbox" id="includeUpper" checked class="accent-emerald-500"> Upper</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="includeLower" checked class="accent-emerald-500"> Lower</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="includeNumbers" checked class="accent-emerald-500"> Numbers</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="includeSymbols" checked class="accent-emerald-500"> Symbols</label>
        </div>
        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition-all">
            <i class="fas fa-sync-alt mr-2"></i> Generate Password
        </button>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));
        const slider = document.getElementById('lengthSlider'), val = document.getElementById('lengthVal');
        slider.addEventListener('input', () => val.innerText = slider.value);

        document.getElementById('generateBtn').addEventListener('click', () => {
            let pool = "";
            if(document.getElementById('includeUpper').checked) pool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(document.getElementById('includeLower').checked) pool += "abcdefghijklmnopqrstuvwxyz";
            if(document.getElementById('includeNumbers').checked) pool += "0123456789";
            if(document.getElementById('includeSymbols').checked) pool += "!@#$%^&*()_+";
            
            if(pool === "") return alert("Kam se kam ek option toh select karo!");
            
            let pass = "";
            const array = new Uint32Array(slider.value);
            window.crypto.getRandomValues(array);
            for(let i=0; i<slider.value; i++) pass += pool[array[i] % pool.length];
            document.getElementById('passwordDisplay').value = pass;
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const pass = document.getElementById('passwordDisplay').value;
            if(!pass) return;
            navigator.clipboard.writeText(pass);
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check text-emerald-400"></i>';
            setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i>', 2000);
        });
    </script>
</body>
</html>
