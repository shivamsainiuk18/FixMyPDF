<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        #qrcode img { margin: 0 auto; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <a href="index.html" class="text-blue-500 hover:text-blue-400"><i class="fas fa-home text-xl"></i></a>
        <h1 class="text-lg font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="text-gray-400 hover:text-yellow-500"><i class="fas fa-adjust"></i></button>
    </header>

    <div class="mb-6 text-center">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">QR Code Generator</h2>
        <p class="text-xs text-gray-400">Convert links to QR code instantly.</p>
    </div>

    <div class="custom-card rounded-2xl p-5 mb-4 space-y-3">
        <input type="text" id="qrText" placeholder="Paste URL or Text here..." class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-sm outline-none focus:border-yellow-500">
        <button id="generateBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl transition-all">
            <i class="fas fa-qrcode mr-2"></i> Generate QR
        </button>
    </div>

    <div class="custom-card rounded-2xl p-6 text-center space-y-4 hidden" id="outputContainer">
        <div id="qrcode" class="p-2 bg-white rounded-lg inline-block"></div>
        <button id="downloadBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-all">
            <i class="fas fa-download mr-2"></i> Download PNG
        </button>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));
        const qrcodeDiv = document.getElementById("qrcode");
        let qrCodeInstance = null;

        document.getElementById('generateBtn').addEventListener('click', () => {
            const text = document.getElementById('qrText').value.trim();
            if (!text) return alert('Bhai, kuch text ya link toh daalo!');
            qrcodeDiv.innerHTML = '';
            qrCodeInstance = new QRCode(qrcodeDiv, { text: text, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.H });
            document.getElementById('outputContainer').classList.remove('hidden');
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const img = qrcodeDiv.querySelector('img');
            if (!img) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = "FixMyPDF_QR.png";
            link.click();
        });
    </script>
</body>
</html>
