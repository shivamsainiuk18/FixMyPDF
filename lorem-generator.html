<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Professional Glass Header -->
    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <a href="index.html" class="text-blue-500 hover:text-blue-400"><i class="fas fa-home text-xl"></i></a>
        <h1 class="text-lg font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="text-gray-400 hover:text-pink-500"><i class="fas fa-adjust"></i></button>
    </header>

    <div class="mb-6 text-center">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Lorem Ipsum Generator</h2>
        <p class="text-xs text-gray-400">Dummy placeholder text engine.</p>
    </div>

    <!-- Controls -->
    <div class="custom-card rounded-2xl p-5 mb-4 space-y-4">
        <div class="grid grid-cols-2 gap-3 text-xs">
            <div>
                <label class="block text-gray-400 mb-1">Type:</label>
                <select id="typeSelect" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 font-bold outline-none focus:border-pink-500">
                    <option value="paragraphs">Paragraphs</option>
                    <option value="words">Words</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-400 mb-1">Count:</label>
                <input type="number" id="countInput" value="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 font-bold outline-none focus:border-pink-500">
            </div>
        </div>
        <button id="generateBtn" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3.5 rounded-xl transition-all">
            <i class="fas fa-magic mr-2"></i> Generate Text
        </button>
    </div>

    <!-- Output -->
    <div class="custom-card rounded-2xl p-4 mb-4 hidden" id="outputContainer">
        <div class="flex justify-between items-center mb-3 border-b border-gray-700 pb-2 text-xs">
            <span class="font-bold uppercase text-pink-500">Result</span>
            <button id="copyBtn" class="text-gray-400 hover:text-white transition-colors"><i class="far fa-copy mr-1"></i> Copy</button>
        </div>
        <div id="outputText" class="text-xs text-gray-300 leading-relaxed"></div>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));

        const loremLibrary = [
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
            "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
            "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur."
        ];

        document.getElementById('generateBtn').addEventListener('click', () => {
            const type = document.getElementById('typeSelect').value;
            const count = parseInt(document.getElementById('countInput').value) || 1;
            const output = document.getElementById('outputText');
            
            let result = "";
            if (type === "paragraphs") {
                result = Array(count).fill(loremLibrary[0]).join("\n\n");
            } else {
                result = "Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor".split(" ").slice(0, count).join(" ") + ".";
            }
            output.innerText = result;
            document.getElementById('outputContainer').classList.remove('hidden');
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('outputText').innerText);
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check text-pink-400"></i> Copied!';
            setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i> Copy', 2000);
        });
    </script>
</body>
</html>
