<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Header -->
    <header class="my-6 flex justify-between items-center custom-card p-4 rounded-2xl">
        <a href="index.html" class="text-xs font-bold text-blue-500 flex items-center gap-1.5"><i class="fas fa-arrow-left"></i> Home</a>
        <h1 class="text-xl font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="px-3 py-1 rounded-full border border-gray-700 text-[10px] font-bold">Theme</button>
    </header>

    <div class="mb-4">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Word Counter</h2>
        <p class="text-xs text-gray-400">Text ke words aur characters count karein.</p>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-4 gap-2 mb-4 text-center">
        <div class="custom-card rounded-xl p-2"><p class="text-[9px] uppercase font-bold text-gray-500">Words</p><p id="wordCount" class="text-sm font-black text-indigo-400">0</p></div>
        <div class="custom-card rounded-xl p-2"><p class="text-[9px] uppercase font-bold text-gray-500">Chars</p><p id="charCount" class="text-sm font-black text-indigo-400">0</p></div>
        <div class="custom-card rounded-xl p-2"><p class="text-[9px] uppercase font-bold text-gray-500">Sent</p><p id="sentenceCount" class="text-sm font-black text-indigo-400">0</p></div>
        <div class="custom-card rounded-xl p-2"><p class="text-[9px] uppercase font-bold text-gray-500">Para</p><p id="paragraphCount" class="text-sm font-black text-indigo-400">0</p></div>
    </div>

    <!-- Input Area -->
    <div class="custom-card rounded-2xl p-4 mb-4">
        <textarea id="textInput" rows="8" placeholder="Apna text yahan paste karein..." class="w-full bg-transparent outline-none text-sm resize-none"></textarea>
        <div class="flex gap-2 mt-3">
            <button id="copyBtn" class="flex-1 bg-gray-800 text-white font-bold py-2 rounded-lg text-xs hover:bg-gray-700">Copy</button>
            <button id="clearBtn" class="flex-1 bg-red-900/30 text-red-400 font-bold py-2 rounded-lg text-xs hover:bg-red-900/50">Clear</button>
        </div>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));

        const textInput = document.getElementById('textInput');
        textInput.addEventListener('input', () => {
            const val = textInput.value;
            document.getElementById('charCount').innerText = val.length;
            document.getElementById('wordCount').innerText = val.trim() ? val.trim().split(/\s+/).length : 0;
            document.getElementById('sentenceCount').innerText = val.split(/[.!?]+/).filter(s => s.trim()).length;
            document.getElementById('paragraphCount').innerText = val.split(/\n+/).filter(p => p.trim()).length;
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(textInput.value);
            alert("Copied!");
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            textInput.value = '';
            ['wordCount', 'charCount', 'sentenceCount', 'paragraphCount'].forEach(id => document.getElementById(id).innerText = '0');
        });
    </script>
</body>
</html>
