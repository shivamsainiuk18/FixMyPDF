<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Header -->
    <header class="my-6 flex justify-between items-center custom-card p-4 rounded-2xl">
        <a href="index.html" class="text-xs font-bold text-blue-500 flex items-center gap-1.5"><i class="fas fa-arrow-left"></i> Home</a>
        <h1 class="text-xl font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="px-3 py-1 rounded-full border border-gray-700 text-[10px] font-bold">Theme</button>
    </header>

    <div class="mb-4">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">PDF Compressor</h2>
        <p class="text-xs text-gray-400">Files ka size kam karein bina quality khoye.</p>
    </div>

    <!-- Upload Box -->
    <div class="relative custom-card rounded-2xl p-8 text-center border-2 border-dashed border-red-900/60 hover:border-red-500 transition-all mb-4 group">
        <input accept="application/pdf" id="pdfInput" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"/>
        <div class="w-16 h-16 bg-red-600/10 text-red-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-file-archive text-3xl"></i>
        </div>
        <h3 class="text-sm font-bold" id="uploadBoxText" style="color: var(--text-title);">Choose PDF File</h3>
    </div>

    <!-- Metrics & Status -->
    <div class="mb-4 space-y-2 hidden" id="metricsContainer">
        <div class="custom-card rounded-xl p-3 flex justify-between items-center text-xs">
            <div>
                <p class="text-gray-400 font-medium">Original Size:</p>
                <p id="originalSizeText" class="text-sm font-bold" style="color: var(--text-title);">0.00 MB</p>
            </div>
            <span class="bg-red-900/40 text-red-400 px-2 py-1 rounded text-[10px] font-bold">~30-50% Less</span>
        </div>
    </div>

    <div class="custom-card rounded-xl p-3 mb-4 border-l-4 border-l-red-500 flex items-center gap-2.5 hidden" id="statusMessageBlock">
        <p class="text-xs font-semibold" id="statusMessageText">Optimizing...</p>
    </div>

    <button class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3.5 rounded-xl hidden" id="compressBtn">
        <i class="fas fa-compress-arrows-alt"></i> Compress & Download
    </button>

    <script>
        // Theme Toggle Logic
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });

        // Compression Logic
        const pdfInput = document.getElementById('pdfInput');
        const uploadBoxText = document.getElementById('uploadBoxText');
        const metricsContainer = document.getElementById('metricsContainer');
        const originalSizeText = document.getElementById('originalSizeText');
        const statusMessageBlock = document.getElementById('statusMessageBlock');
        const statusMessageText = document.getElementById('statusMessageText');
        const compressBtn = document.getElementById('compressBtn');
        let selectedFile = null;

        pdfInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                uploadBoxText.innerText = selectedFile.name;
                originalSizeText.innerText = `${(selectedFile.size / (1024 * 1024)).toFixed(2)} MB`;
                metricsContainer.classList.remove('hidden');
                compressBtn.classList.remove('hidden');
            }
        });

        compressBtn.addEventListener('click', async () => {
            statusMessageBlock.classList.remove('hidden');
            statusMessageText.innerText = 'Optimizing document structures...';
            try {
                const fileBytes = await selectedFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
                const compressedPdfBytes = await pdfDoc.save({ useObjectStreams: true });
                const blob = new Blob([compressedPdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Compressed_${selectedFile.name}`;
                link.click();
                statusMessageText.innerText = 'Success! Optimized and downloaded.';
            } catch (error) {
                alert('Failed: ' + error.message);
                statusMessageBlock.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
