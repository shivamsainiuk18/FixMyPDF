<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert to WebP - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <a href="index.html" class="text-blue-500 hover:text-blue-400"><i class="fas fa-home text-xl"></i></a>
        <h1 class="text-lg font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="text-gray-400 hover:text-cyan-500"><i class="fas fa-adjust"></i></button>
    </header>

    <div class="mb-6 text-center">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Convert to WebP</h2>
        <p class="text-xs text-gray-400">Optimize and convert images.</p>
    </div>

    <div class="relative custom-card rounded-2xl p-8 text-center border-2 border-dashed border-cyan-500/30 hover:border-cyan-500 transition-all mb-4">
        <input accept="image/jpeg, image/jpg, image/png" id="imageInput" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
        <div class="w-16 h-16 bg-cyan-600/10 text-cyan-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-sync-alt text-3xl"></i>
        </div>
        <h3 class="text-sm font-bold" id="uploadBoxText">Choose Image File</h3>
    </div>

    <div id="controlsContainer" class="hidden space-y-4">
        <div class="custom-card rounded-xl p-4">
            <label class="text-xs font-semibold block mb-2">Brightness: <span id="brightVal">100%</span></label>
            <input type="range" id="brightSlider" min="50" max="150" value="100" class="w-full accent-cyan-500 h-1.5 bg-gray-800 rounded-lg cursor-pointer">
        </div>
        
        <button id="convertBtn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3.5 rounded-xl transition-all">
            <i class="fas fa-magic mr-2"></i> Convert to WebP
        </button>
        <button id="downloadBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 rounded-xl hidden transition-all">
            <i class="fas fa-download mr-2"></i> Download WebP
        </button>
    </div>

    <script>
        let sourceImage = null;
        let originalFileName = "image";

        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            originalFileName = file.name.split('.')[0];
            document.getElementById('uploadBoxText').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                sourceImage = new Image();
                sourceImage.onload = () => document.getElementById('controlsContainer').classList.remove('hidden');
                sourceImage.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        brightSlider.addEventListener('input', () => document.getElementById('brightVal').innerText = `${brightSlider.value}%`);

        document.getElementById('convertBtn').addEventListener('click', () => {
            document.getElementById('convertBtn').classList.add('hidden');
            document.getElementById('downloadBtn').classList.remove('hidden');
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = sourceImage.width;
            canvas.height = sourceImage.height;
            const ctx = canvas.getContext('2d');
            ctx.filter = `brightness(${brightSlider.value}%)`;
            ctx.drawImage(sourceImage, 0, 0);
            
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/webp", 0.85);
            link.download = `${originalFileName}.webp`;
            link.click();
        });
    </script>
</body>
</html>
