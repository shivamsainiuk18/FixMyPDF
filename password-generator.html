<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="my-6 flex justify-between items-center custom-card p-4 rounded-2xl">
        <a href="index.html" class="text-xs font-bold text-blue-500 flex items-center gap-1.5"><i class="fas fa-arrow-left"></i> Home</a>
        <h1 class="text-xl font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="px-3 py-1 rounded-full border border-gray-700 text-[10px] font-bold">Theme</button>
    </header>

    <div class="mb-4">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Password Generator</h2>
        <p class="text-xs text-gray-400">Secure passwords generate karein.</p>
    </div>

    <div class="custom-card rounded-2xl p-4 mb-4 flex items-center justify-between">
        <input type="text" id="passwordDisplay" readonly placeholder="Generate..." class="bg-transparent font-bold text-lg w-full outline-none">
        <button id="copyBtn" class="text-emerald-400"><i class="far fa-copy"></i></button>
    </div>

    <div class="custom-card rounded-2xl p-5 space-y-4">
        <div>
            <div class="flex justify-between text-xs mb-2"><span>Length:</span> <span id="lengthVal" class="font-bold">12</span></div>
            <input type="range" id="lengthSlider" min="6" max="32" value="12" class="w-full accent-emerald-500">
        </div>
        <div class="grid grid-cols-2 gap-2 text-xs">
            <label><input type="checkbox" id="includeUpper" checked> Upper</label>
            <label><input type="checkbox" id="includeLower" checked> Lower</label>
            <label><input type="checkbox" id="includeNumbers" checked> Numbers</label>
            <label><input type="checkbox" id="includeSymbols" checked> Symbols</label>
        </div>
        <button id="generateBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl">Generate Password</button>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));
        const slider = document.getElementById('lengthSlider'), val = document.getElementById('lengthVal');
        slider.addEventListener('input', () => val.innerText = slider.value);

        document.getElementById('generateBtn').addEventListener('click', () => {
            let pool = "";
            if(document.getElementById('includeUpper').checked) pool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(document.getElementById('includeLower').checked) pool += "abcdefghijklmnopqrstuvwxyz";
            if(document.getElementById('includeNumbers').checked) pool += "0123456789";
            if(document.getElementById('includeSymbols').checked) pool += "!@#$%^&*()_+";
            
            let pass = "";
            const array = new Uint32Array(slider.value);
            window.crypto.getRandomValues(array);
            for(let i=0; i<slider.value; i++) pass += pool[array[i] % pool.length];
            document.getElementById('passwordDisplay').value = pass;
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('passwordDisplay').value);
            alert("Copied!");
        });
    </script>
</body>
</html>
