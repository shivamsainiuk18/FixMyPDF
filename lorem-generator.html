 <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="my-6 flex justify-between items-center custom-card p-4 rounded-2xl">
        <a href="index.html" class="text-xs font-bold text-blue-500 flex items-center gap-1.5"><i class="fas fa-arrow-left"></i> Home</a>
        <h1 class="text-xl font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="px-3 py-1 rounded-full border border-gray-700 text-[10px] font-bold">Theme</button>
    </header>

    <div class="mb-4">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Lorem Ipsum Generator</h2>
        <p class="text-xs text-gray-400">Dummy placeholder text generate karein.</p>
    </div>

    <div class="custom-card rounded-2xl p-5 mb-4 space-y-4">
        <div class="grid grid-cols-2 gap-3 text-xs">
            <div>
                <label class="block text-gray-400 font-medium mb-1">Type:</label>
                <select id="typeSelect" class="w-full bg-transparent border border-gray-700 rounded-lg p-2 font-bold outline-none">
                    <option value="paragraphs">Paragraphs</option>
                    <option value="words">Words</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-400 font-medium mb-1">Count:</label>
                <input type="number" id="countInput" value="3" class="w-full bg-transparent border border-gray-700 rounded-lg p-2 font-bold outline-none">
            </div>
        </div>
        <button id="generateBtn" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 rounded-xl">Generate Text</button>
    </div>

    <div class="custom-card rounded-2xl p-4 mb-4 hidden" id="outputContainer">
        <div class="flex justify-between items-center mb-2 border-b border-gray-800 pb-2 text-xs">
            <span class="font-bold uppercase text-gray-500">Output:</span>
            <button id="copyBtn" class="text-pink-400 font-bold"><i class="far fa-copy"></i> Copy</button>
        </div>
        <div id="outputText" class="text-xs text-gray-300 leading-relaxed"></div>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));

        const loremLibrary = [
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
            "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
            "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur."
        ];

        document.getElementById('generateBtn').addEventListener('click', () => {
            const type = document.getElementById('typeSelect').value;
            const count = document.getElementById('countInput').value;
            const output = document.getElementById('outputText');
            let result = "";

            if (type === "paragraphs") {
                result = Array(parseInt(count)).fill(loremLibrary[0]).join("\n\n");
            } else {
                result = "Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor".split(" ").slice(0, count).join(" ") + ".";
            }
            output.innerText = result;
            document.getElementById('outputContainer').classList.remove('hidden');
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('outputText').innerText);
            alert("Copied!");
        });
    </script>
</body>
</html>
