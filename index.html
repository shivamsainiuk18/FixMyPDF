<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyPDF - Smart & Private Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); transition: 0.3s; }
        .custom-card { background: var(--bg-card); border: 1px solid #232936; }
        .tool-btn { background: #1f2937; padding: 16px; border-radius: 12px; text-align: center; transition: 0.3s; border: 1px solid #374151; }
        .tool-btn:hover { border-color: #3b82f6; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-[var(--text-title)]">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="bg-gray-800 text-white px-4 py-1.5 rounded-full text-xs font-bold">Mode</button>
    </header>

    <a href="jpg-to-pdf.html" class="block custom-card rounded-2xl p-6 text-center border-2 border-dashed border-blue-500/30 mb-6">
        <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center mx-auto mb-3">
            <i class="fas fa-file-upload text-2xl"></i>
        </div>
        <h3 class="font-bold text-[var(--text-title)]">Select Images to Convert</h3>
    </a>

    <h2 class="text-xs font-bold text-gray-500 uppercase mb-3">PDF Tools</h2>
    <div class="grid grid-cols-2 gap-3 mb-6">
        <a href="jpg-to-pdf.html" class="tool-btn"><i class="fas fa-file-image text-blue-400 mb-2"></i><div class="text-xs font-bold">JPG to PDF</div></a>
        <a href="png-to-pdf.html" class="tool-btn"><i class="fas fa-file-contract text-green-400 mb-2"></i><div class="text-xs font-bold">PNG to PDF</div></a>
        <a href="pdf-merger.html" class="tool-btn"><i class="fas fa-object-group text-yellow-400 mb-2"></i><div class="text-xs font-bold">PDF Merger</div></a>
        <a href="pdf-compressor.html" class="tool-btn"><i class="fas fa-compress-arrows-alt text-red-400 mb-2"></i><div class="text-xs font-bold">PDF Compressor</div></a>
    </div>

    <h2 class="text-xs font-bold text-gray-500 uppercase mb-3">Image Tools</h2>
    <div class="grid grid-cols-2 gap-3 mb-6">
        <a href="image-compressor.html" class="tool-btn"><i class="fas fa-compress text-purple-400 mb-2"></i><div class="text-xs font-bold">Img Compressor</div></a>
        <a href="image-resizer.html" class="tool-btn"><i class="fas fa-expand text-pink-400 mb-2"></i><div class="text-xs font-bold">Img Resizer</div></a>
        <a href="webp-converter.html" class="tool-btn"><i class="fas fa-sync text-cyan-400 mb-2"></i><div class="text-xs font-bold">Convert WebP</div></a>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <a href="qr-generator.html" class="tool-btn"><i class="fas fa-qrcode text-yellow-500 mb-2"></i><div class="text-xs font-bold">QR Generator</div></a>
        <a href="password-generator.html" class="tool-btn"><i class="fas fa-key text-emerald-500 mb-2"></i><div class="text-xs font-bold">Pass Gen</div></a>
        <a href="word-counter.html" class="tool-btn"><i class="fas fa-font text-indigo-400 mb-2"></i><div class="text-xs font-bold">Word Counter</div></a>
        <a href="lorem-generator.html" class="tool-btn"><i class="fas fa-pen text-orange-400 mb-2"></i><div class="text-xs font-bold">Lorem Ipsum</div></a>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));
    </script>
</body>
</html>
