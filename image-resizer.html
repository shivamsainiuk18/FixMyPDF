<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - FixMyPDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-main: #0d0f14; --bg-card: #161920; --border-color: #232936; --text-main: #e2e8f0; --text-title: #ffffff; }
        body.light-mode { --bg-main: #f3f4f6; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #374151; --text-title: #111827; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, sans-serif; transition: 0.2s; }
        .custom-card { background: var(--bg-card); border: 1px solid var(--border-color); }
        .glass-header { background: rgba(22, 25, 32, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="glass-header sticky top-0 z-50 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
        <a href="index.html" class="text-blue-500 hover:text-blue-400"><i class="fas fa-home text-xl"></i></a>
        <h1 class="text-lg font-bold" style="color: var(--text-title);">FixMy<span class="text-blue-500">PDF</span></h1>
        <button id="themeToggle" class="text-gray-400 hover:text-purple-500"><i class="fas fa-adjust"></i></button>
    </header>

    <div class="mb-6 text-center">
        <h2 class="text-lg font-bold" style="color: var(--text-title);">Image Resizer</h2>
        <p class="text-xs text-gray-400">Change image dimensions in pixels.</p>
    </div>

    <div class="relative custom-card rounded-2xl p-8 text-center border-2 border-dashed border-purple-500/30 hover:border-purple-500 transition-all mb-4">
        <input accept="image/jpeg, image/jpg, image/png" id="imageInput" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/>
        <div class="w-16 h-16 bg-purple-600/10 text-purple-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-arrows-alt text-3xl"></i>
        </div>
        <h3 class="text-sm font-bold" id="uploadBoxText">Choose Image File</h3>
    </div>

    <div class="mb-4 space-y-4 hidden" id="controlsContainer">
        <div class="custom-card rounded-xl p-3 text-center text-xs">
            <p class="text-gray-400 font-medium">Original Dimensions:</p>
            <p id="originalDims" class="text-sm font-bold mt-1">0 x 0 px</p>
        </div>
        <div class="custom-card rounded-xl p-4 space-y-3">
            <div class="grid grid-cols-2 gap-3 text-xs">
                <div>
                    <label class="block text-gray-400 mb-1">Width (px):</label>
                    <input type="number" id="widthInput" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Height (px):</label>
                    <input type="number" id="heightInput" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 outline-none focus:border-purple-500">
                </div>
            </div>
            <label class="flex items-center gap-2 text-xs font-medium cursor-pointer">
                <input type="checkbox" id="aspectRatioCheck" checked class="accent-purple-500"> Lock Aspect Ratio
            </label>
        </div>
        <button id="downloadBtn" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3.5 rounded-xl transition-all">
            <i class="fas fa-download mr-2"></i> Resize & Download
        </button>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light-mode'));

        const imageInput = document.getElementById('imageInput'), uploadBoxText = document.getElementById('uploadBoxText');
        const controlsContainer = document.getElementById('controlsContainer'), originalDims = document.getElementById('originalDims');
        const widthInput = document.getElementById('widthInput'), heightInput = document.getElementById('heightInput');
        const downloadBtn = document.getElementById('downloadBtn');
        let sourceImage = null, originalRatio = 1, fileType = "image/jpeg", fileName = "";

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            uploadBoxText.innerText = file.name;
            fileName = file.name;
            fileType = file.type;
            const reader = new FileReader();
            reader.onload = (event) => {
                sourceImage = new Image();
                sourceImage.onload = () => {
                    originalDims.innerText = `${sourceImage.width} x ${sourceImage.height} px`;
                    widthInput.value = sourceImage.width; heightInput.value = sourceImage.height;
                    originalRatio = sourceImage.width / sourceImage.height;
                    controlsContainer.classList.remove('hidden');
                };
                sourceImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        widthInput.addEventListener('input', () => { if(document.getElementById('aspectRatioCheck').checked) heightInput.value = Math.round(widthInput.value / originalRatio); });
        heightInput.addEventListener('input', () => { if(document.getElementById('aspectRatioCheck').checked) widthInput.value = Math.round(heightInput.value * originalRatio); });

        downloadBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = widthInput.value; canvas.height = heightInput.value;
            canvas.getContext('2d').drawImage(sourceImage, 0, 0, canvas.width, canvas.height);
            const link = document.createElement('a');
            link.href = canvas.toDataURL(fileType);
            link.download = `Resized_${fileName}`;
            link.click();
        });
    </script>
</body>
</html>
